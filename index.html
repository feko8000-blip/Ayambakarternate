<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ayam Bakar Wong Sini — Ternate</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --arang:    #1A1510;
      --arang2:   #241C14;
      --coklat:   #3D2B1F;
      --emas:     #C9A84C;
      --emas-muda:#E8C96A;
      --krem:     #F5EDD8;
      --putih:    #FAF7F2;
      --abu:      #8A7A6A;
    }

    html { scroll-behavior: smooth; }

    /* ── TOMBOL WA MENGAMBANG ── */
    .wa-float {
      position: fixed;
      bottom: 1.75rem;
      right: 1.75rem;
      z-index: 999;
      display: flex;
      align-items: center;
      gap: .65rem;
      background: #25D366;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: .8rem;
      font-weight: 600;
      letter-spacing: .05em;
      text-decoration: none;
      padding: .75rem 1.25rem .75rem .9rem;
      border-radius: 3rem;
      box-shadow: 0 4px 20px rgba(37,211,102,.4), 0 2px 8px rgba(0,0,0,.35);
      transition: transform .2s, box-shadow .2s, background .2s;
    }
    .wa-float:hover {
      background: #1ebe5c;
      transform: translateY(-3px);
      box-shadow: 0 8px 28px rgba(37,211,102,.5), 0 4px 12px rgba(0,0,0,.35);
    }
    .wa-float svg {
      width: 22px; height: 22px; flex-shrink: 0;
    }
    /* pulse ring */
    .wa-float::before {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 3rem;
      border: 2px solid rgba(37,211,102,.5);
      animation: waPulse 2s ease-out infinite;
    }
    @keyframes waPulse {
      0%   { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(1.18); }
    }

    body {
      background: var(--arang);
      color: var(--krem);
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      line-height: 1.7;
      overflow-x: hidden;
    }

    /* ── NAV ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.25rem 2.5rem;
      background: linear-gradient(to bottom, rgba(26,21,16,.95), transparent);
      backdrop-filter: blur(2px);
    }
    .nav-logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      letter-spacing: .08em;
      color: var(--emas);
      text-decoration: none;
    }
    .nav-links { display: flex; gap: 2rem; list-style: none; }
    .nav-links a {
      font-size: .8rem; letter-spacing: .12em; text-transform: uppercase;
      color: var(--krem); opacity: .75; text-decoration: none;
      transition: opacity .2s, color .2s;
    }
    .nav-links a:hover { opacity: 1; color: var(--emas); }

    /* ── HERO ── */
    .hero {
      position: relative; min-height: 100svh;
      display: flex; flex-direction: column; justify-content: flex-end;
      padding: 0 2.5rem 5rem;
      overflow: hidden;
    }
    .hero-bg {
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 60% 60% at 70% 40%, rgba(201,168,76,.10) 0%, transparent 70%),
        radial-gradient(ellipse 80% 50% at 50% 80%, rgba(61,43,31,.8) 0%, transparent 80%),
        linear-gradient(160deg, #1A1510 0%, #241C14 50%, #1A1510 100%);
    }

    /* ember particles */
    .embers {
      position: absolute; inset: 0; pointer-events: none;
    }
    .ember {
      position: absolute;
      width: 3px; height: 3px;
      border-radius: 50%;
      background: var(--emas);
      animation: float var(--dur, 4s) ease-in infinite var(--delay, 0s);
      opacity: 0;
    }
    @keyframes float {
      0%   { transform: translateY(0) scale(1); opacity: 0; }
      20%  { opacity: .8; }
      80%  { opacity: .4; }
      100% { transform: translateY(-120px) translateX(var(--drift,20px)) scale(.3); opacity: 0; }
    }

    .hero-badge {
      position: relative;
      display: inline-flex; align-items: center; gap: .5rem;
      font-size: .7rem; letter-spacing: .18em; text-transform: uppercase;
      color: var(--emas); margin-bottom: 1.5rem;
    }
    .hero-badge::before {
      content: ''; display: inline-block;
      width: 2rem; height: 1px; background: var(--emas); opacity: .6;
    }

    .hero h1 {
      position: relative;
      font-family: 'Playfair Display', serif;
      font-size: clamp(3rem, 8vw, 7rem);
      font-weight: 600;
      line-height: 1.05;
      color: var(--putih);
      margin-bottom: 1.5rem;
    }
    .hero h1 em {
      font-style: italic;
      color: var(--emas);
    }

    .hero-meta {
      position: relative;
      display: flex; align-items: center; gap: 2.5rem;
      margin-bottom: 2.5rem;
    }
    .rating {
      display: flex; align-items: center; gap: .5rem;
      font-size: .85rem;
    }
    .stars { color: var(--emas); letter-spacing: .05em; }
    .rating-num { font-weight: 600; }
    .rating-count { color: var(--abu); }
    .divider-dot { width: 3px; height: 3px; border-radius: 50%; background: var(--abu); }
    .open-badge {
      font-size: .72rem; font-weight: 500; letter-spacing: .1em; text-transform: uppercase;
      color: #4CAF50; background: rgba(76,175,80,.12);
      border: 1px solid rgba(76,175,80,.3);
      padding: .3rem .8rem; border-radius: 2rem;
    }

    .hero-desc {
      position: relative;
      max-width: 480px;
      font-size: .95rem; color: var(--abu);
      margin-bottom: 2.5rem;
    }

    .hero-cta {
      position: relative; display: flex; gap: 1rem; flex-wrap: wrap;
    }
    .btn-primary {
      display: inline-flex; align-items: center; gap: .6rem;
      background: var(--emas); color: var(--arang);
      font-size: .8rem; font-weight: 600; letter-spacing: .12em; text-transform: uppercase;
      padding: .9rem 2rem; border-radius: 2px;
      text-decoration: none; border: none; cursor: pointer;
      transition: background .2s, transform .15s;
    }
    .btn-primary:hover { background: var(--emas-muda); transform: translateY(-1px); }
    .btn-secondary {
      display: inline-flex; align-items: center; gap: .6rem;
      background: transparent; color: var(--krem);
      font-size: .8rem; font-weight: 500; letter-spacing: .12em; text-transform: uppercase;
      padding: .9rem 2rem; border-radius: 2px;
      text-decoration: none; border: 1px solid rgba(245,237,216,.3); cursor: pointer;
      transition: border-color .2s, color .2s;
    }
    .btn-secondary:hover { border-color: var(--emas); color: var(--emas); }

    .hero-scroll {
      position: absolute; bottom: 2rem; right: 2.5rem;
      display: flex; flex-direction: column; align-items: center; gap: .4rem;
      font-size: .65rem; letter-spacing: .15em; text-transform: uppercase;
      color: var(--abu); opacity: .6;
    }
    .scroll-line {
      width: 1px; height: 3rem;
      background: linear-gradient(to bottom, var(--emas), transparent);
      animation: scrollPulse 2s ease-in-out infinite;
    }
    @keyframes scrollPulse {
      0%, 100% { opacity: .3; }
      50% { opacity: 1; }
    }

    /* ── SECTION SHARED ── */
    section { padding: 6rem 2.5rem; }
    .section-eyebrow {
      font-size: .7rem; letter-spacing: .2em; text-transform: uppercase;
      color: var(--emas); margin-bottom: 1rem;
      display: flex; align-items: center; gap: .75rem;
    }
    .section-eyebrow::after {
      content: ''; flex: 1; max-width: 3rem;
      height: 1px; background: var(--emas); opacity: .4;
    }

    /* ── SIGNATURE DISH ── */
    .signature {
      background: var(--arang2);
      display: grid; grid-template-columns: 1fr 1fr; gap: 0;
      padding: 0;
    }
    .sig-visual {
      position: relative; min-height: 520px; overflow: hidden;
    }
    .sig-visual-inner {
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 70% 60% at 30% 60%, rgba(201,168,76,.15) 0%, transparent 70%),
        linear-gradient(135deg, #3D2B1F 0%, #1A1510 100%);
      display: flex; align-items: center; justify-content: center;
    }
    /* Decorative plate illustration */
    .plate-art {
      position: relative; width: 280px; height: 280px;
    }
    .plate-outer {
      width: 100%; height: 100%;
      border-radius: 50%;
      background: linear-gradient(145deg, #4a3525, #2a1a10);
      border: 3px solid rgba(201,168,76,.3);
      box-shadow:
        0 0 60px rgba(201,168,76,.2),
        inset 0 0 40px rgba(0,0,0,.5);
      display: flex; align-items: center; justify-content: center;
    }
    .plate-inner {
      width: 82%; height: 82%;
      border-radius: 50%;
      background: linear-gradient(145deg, #3a2820, #201410);
      border: 1px solid rgba(201,168,76,.15);
      display: flex; align-items: center; justify-content: center;
      font-size: 5rem;
    }
    .glow-ring {
      position: absolute; inset: -20px;
      border-radius: 50%;
      background: radial-gradient(ellipse at center, rgba(201,168,76,.12) 0%, transparent 70%);
      animation: glowPulse 3s ease-in-out infinite;
    }
    @keyframes glowPulse {
      0%, 100% { opacity: .5; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.05); }
    }

    .sig-content {
      padding: 5rem 4rem;
      display: flex; flex-direction: column; justify-content: center;
    }
    .sig-content h2 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 3.5vw, 3rem);
      line-height: 1.2;
      margin-bottom: 1.5rem;
    }
    .sig-content h2 span { color: var(--emas); }
    .sig-content p {
      font-size: .95rem; color: var(--abu); margin-bottom: 2rem;
      max-width: 380px;
    }
    .features-list { list-style: none; margin-bottom: 2.5rem; }
    .features-list li {
      display: flex; align-items: center; gap: .75rem;
      font-size: .85rem; padding: .5rem 0;
      border-bottom: 1px solid rgba(255,255,255,.06);
      color: var(--krem);
    }
    .features-list li:last-child { border-bottom: none; }
    .feat-icon { color: var(--emas); font-size: 1rem; }

    /* ── MENU ── */
    .menu { max-width: 1100px; margin: 0 auto; padding: 6rem 2.5rem; }
    .menu-header { text-align: center; margin-bottom: 4rem; }
    .menu-header h2 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 4vw, 3.2rem);
      margin-bottom: .75rem;
    }
    .menu-header p { color: var(--abu); max-width: 400px; margin: 0 auto; }
    .menu-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1.5px; background: rgba(255,255,255,.06);
    }
    .menu-card {
      background: var(--arang2); padding: 2rem 2rem 1.75rem;
      transition: background .2s;
      position: relative; overflow: hidden;
    }
    .menu-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0;
      height: 2px; background: linear-gradient(90deg, transparent, var(--emas), transparent);
      opacity: 0; transition: opacity .3s;
    }
    .menu-card:hover { background: #1f1a13; }
    .menu-card:hover::before { opacity: 1; }
    .menu-emoji { font-size: 2rem; margin-bottom: 1rem; display: block; }
    .menu-card h3 {
      font-family: 'Playfair Display', serif; font-size: 1.15rem;
      margin-bottom: .4rem; color: var(--putih);
    }
    .menu-card p { font-size: .83rem; color: var(--abu); margin-bottom: 1.25rem; }
    .price {
      font-size: .9rem; font-weight: 600; color: var(--emas);
      letter-spacing: .05em;
    }

    /* ── INFO ── */
    .info-strip {
      background: var(--coklat);
      padding: 4rem 2.5rem;
      display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 2rem;
      border-top: 1px solid rgba(201,168,76,.2);
      border-bottom: 1px solid rgba(201,168,76,.2);
    }
    .info-block { text-align: center; }
    .info-icon { font-size: 1.75rem; margin-bottom: .75rem; }
    .info-label {
      font-size: .68rem; letter-spacing: .16em; text-transform: uppercase;
      color: var(--emas); margin-bottom: .4rem;
    }
    .info-value { font-size: 1rem; color: var(--putih); }
    .info-sub { font-size: .8rem; color: var(--abu); }

    /* ── TESTIMONIALS ── */
    .testimonials { max-width: 1000px; margin: 0 auto; padding: 6rem 2.5rem; text-align: center; }
    .testimonials h2 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.8rem, 3.5vw, 2.8rem);
      margin-bottom: 3rem;
    }
    .reviews-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 1.5rem;
    }
    .review-card {
      background: var(--arang2); padding: 1.75rem;
      border: 1px solid rgba(255,255,255,.06);
      border-radius: 2px; text-align: left;
    }
    .review-stars { color: var(--emas); font-size: .9rem; margin-bottom: .75rem; }
    .review-text { font-size: .88rem; color: var(--krem); line-height: 1.7; margin-bottom: 1rem; }
    .review-author { font-size: .75rem; color: var(--abu); }

    /* ── FOOTER ── */
    footer {
      background: #100D09; padding: 3rem 2.5rem 2rem;
      border-top: 1px solid rgba(201,168,76,.15);
      display: grid; grid-template-columns: 1fr auto; gap: 2rem;
      align-items: start;
    }
    .footer-brand h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem; color: var(--emas); margin-bottom: .4rem;
    }
    .footer-brand p { font-size: .83rem; color: var(--abu); }
    .footer-right { text-align: right; }
    .footer-right p { font-size: .8rem; color: var(--abu); }
    .footer-right a { color: var(--emas); text-decoration: none; }
    .footer-copy {
      margin-top: 2.5rem; padding-top: 1.5rem;
      border-top: 1px solid rgba(255,255,255,.05);
      grid-column: 1 / -1;
      display: flex; justify-content: space-between; align-items: center;
      font-size: .72rem; color: var(--abu); letter-spacing: .05em;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      nav { padding: 1rem 1.25rem; }
      .nav-links { display: none; }
      .hero { padding: 0 1.25rem 4rem; }
      .signature { grid-template-columns: 1fr; }
      .sig-visual { min-height: 320px; }
      .sig-content { padding: 2.5rem 1.25rem; }
      section, .menu, .testimonials { padding: 4rem 1.25rem; }
      .info-strip { padding: 3rem 1.25rem; }
      footer { grid-template-columns: 1fr; }
      .footer-right { text-align: left; }
      .footer-copy { flex-direction: column; gap: .5rem; text-align: center; }
    }

    @media (prefers-reduced-motion: reduce) {
      .ember, .scroll-line, .glow-ring { animation: none; }
    }
  </style>
</head>
<body>

<!-- NAV -->
<nav>
  <a class="nav-logo" href="#">Wong Sini</a>
  <ul class="nav-links">
    <li><a href="#menu">Menu</a></li>
    <li><a href="#info">Lokasi</a></li>
    <li><a href="#ulasan">Ulasan</a></li>
  </ul>
</nav>

<!-- HERO -->
<section class="hero">
  <div class="hero-bg"></div>

  <div class="embers" id="embers"></div>

  <p class="hero-badge">Restoran Khas Banjarmasin</p>

  <h1>Ayam Bakar<br><em>Wong Sini</em></h1>

  <div class="hero-meta">
    <div class="rating">
      <span class="stars">★★★★</span>
      <span class="rating-num">4,1</span>
      <span class="rating-count">(48 ulasan)</span>
    </div>
    <div class="divider-dot"></div>
    <span class="open-badge">● Buka 24 Jam</span>
  </div>

  <p class="hero-desc">
    Cita rasa autentik ayam bakar khas Banjarmasin — dimasak di atas bara kayu nyata,
    disajikan dengan sambal terbaik di Jalan Ternate.
  </p>

  <div class="hero-cta">
    <a href="#menu" class="btn-primary">🍗 Lihat Menu</a>
    <a href="#info" class="btn-secondary">📍 Temukan Kami</a>
  </div>

  <div class="hero-scroll">
    <span>Gulir</span>
    <div class="scroll-line"></div>
  </div>
</section>

<!-- SIGNATURE -->
<div class="signature" id="menu">
  <div class="sig-visual">
    <div class="sig-visual-inner" style="padding:0;overflow:hidden;">
      <img src="data:image/jpeg;base6``.
